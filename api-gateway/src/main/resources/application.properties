spring.application.name=api-gateway
server.port=8080

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=servicio-clientes
spring.cloud.gateway.routes[0].uri=lb://servicio-clientes
spring.cloud.gateway.routes[0].predicates[0]=Path=/clientes/**

spring.cloud.gateway.routes[1].id=servicio-productos
spring.cloud.gateway.routes[1].uri=lb://servicio-productos
spring.cloud.gateway.routes[1].predicates[0]=Path=/productos/**,/categorias/**

spring.cloud.gateway.routes[2].id=servicio-pedidos
spring.cloud.gateway.routes[2].uri=lb://servicio-pedidos
spring.cloud.gateway.routes[2].predicates[0]=Path=/pedidos/**

spring.cloud.gateway.routes[3].id=servicio-pagos
spring.cloud.gateway.routes[3].uri=lb://servicio-pagos
spring.cloud.gateway.routes[3].predicates[0]=Path=/metodos-pago/**

spring.cloud.gateway.routes[4].id=servicio-entregas
spring.cloud.gateway.routes[4].uri=lb://servicio-entregas
spring.cloud.gateway.routes[4].predicates[0]=Path=/entregas/**

spring.cloud.gateway.routes[5].id=reportes
spring.cloud.gateway.routes[5].uri=lb://servicio-pedidos
spring.cloud.gateway.routes[5].predicates[0]=Path=/reportes/**
